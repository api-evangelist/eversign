aid: eversign
name: Eversign
description: >-
  E-signature and document management platform with a REST API for creating,
  sending, and managing electronic signature requests, templates, audit trails,
  bulk sending, embedded signing, and webhook notifications. Now branded as
  Xodo Sign, formerly eversign.
