  """State or province."""
  state: String
  """Postal/ZIP code."""
  postalCode: String
  """Country code (ISO 3166-1 alpha-2)."""
  country: String
}

"""Core business account entity."""
type Business {
  """Unique business ID."""
  businessId: Int!
  """Business display name."""
  name: String!
  """Primary contact email."""
  email: String!
  """Business address."""
  address: BusinessAddress
  """Current plan name."""
  plan: String
  """Business website URL."""
  website: String
}

"""Extended business account with plan limits and usage stats."""
type BusinessDetails {
  """Unique business ID."""
  businessId: Int!
  """Business display name."""
  name: String!
  """Primary contact email."""
  email: String!
  """Business address."""
  address: BusinessAddress
  """Current plan name."""
  plan: String
  """Plan document limit per month."""
  planDocumentLimit: Int
  """Number of documents used this month."""
  documentsUsedThisMonth: Int
  """Number of team members."""
  teamMemberCount: Int
  """Business timezone."""
  timezone: String
  """Business logo URL."""
  logoURL: String
  """Business website URL."""
  website: String
  """Timestamp when the business was created."""
  createdAt: DateTime!
  """Timestamp of last update."""
  updatedAt: DateTime
}

# ─── Team Member Types ────────────────────────────────────────────────────────

"""Role of a team member within a business."""
enum MemberRole {
  OWNER
  ADMIN
  MEMBER
  VIEWER
}

"""Extended team member info with permissions."""
type MemberDetails {
  """Unique user ID."""
  userId: Int!
  """Member's full name."""
  name: String!
  """Member's email address."""
  email: String!
  """Role in the team."""
  role: MemberRole!
  """Timestamp the member joined."""
  joinedAt: DateTime
  """Whether the member's account is active."""
  active: Boolean!
  """Whether the member can create documents."""
  canCreateDocuments: Boolean
  """Whether the member can manage templates."""
  canManageTemplates: Boolean
  """Whether the member can view all documents."""
  canViewAllDocuments: Boolean
}

"""A member of a business team."""
type TeamMember {
  """Unique user ID."""
  userId: Int!
  """Member's full name."""
  name: String!
  """Member's email address."""
  email: String!
  """Role in the team."""
  role: MemberRole!
  """Whether the member's account is active."""
  active: Boolean!
}

# ─── Auth Types ───────────────────────────────────────────────────────────────

"""An API key credential for authenticating REST requests."""
type APIKey {
  """The API key string."""
  accessKey: String!
  """Descriptive label for this key."""
  label: String
  """Timestamp when the key was created."""
  createdAt: DateTime!
  """Whether the key is currently active."""
  active: Boolean!
  """Business ID this key belongs to."""
  businessId: Int!
}

"""An OAuth application registered with Eversign."""
type OAuthApp {
  """OAuth client ID."""
  clientId: String!
  """OAuth client secret (only shown at creation)."""
  clientSecret: String
  """Application display name."""
  name: String!
  """Redirect URI registered for this app."""
  redirectURI: String!
  """Scopes granted to this application."""
  scopes: [String!]
  """Timestamp when the app was registered."""
  createdAt: DateTime!
}

"""An OAuth access and refresh token pair."""
type Token {
  """Bearer access token."""
  accessToken: String!
  """Token type (always Bearer)."""
  tokenType: String!
  """Seconds until the access token expires."""
  expiresIn: Int!
  """Refresh token for obtaining a new access token."""
  refreshToken: String
  """Scopes granted by this token."""
  scope: String
  """Business ID this token is associated with."""
  businessId: Int
}

# ─── Webhook Types ────────────────────────────────────────────────────────────

"""A registered webhook endpoint."""
type Webhook {
  """Unique identifier for the webhook."""
  webhookId: String!
  """URL that receives webhook POST requests."""
  url: String!
  """Whether the webhook is currently active."""
  active: Boolean!
  """Business ID this webhook is registered for."""
  businessId: Int!
  """Event types this webhook subscribes to."""
  events: [String!]!
  """Timestamp when the webhook was registered."""
  createdAt: DateTime!
}

"""A webhook event payload delivered to a registered endpoint."""
type WebhookEvent {
  """Type of event (e.g., document_signed, document_completed)."""
  event: String!
  """Timestamp of the event."""
  timestamp: DateTime!
  """Document hash the event relates to."""
  documentHash: String
  """Signer ID if the event relates to a specific signer."""
  signerId: Int
  """Full document object at the time of the event."""
  document: Document
  """Raw event metadata."""
  meta: JSON
}

# ─── Error Types ──────────────────────────────────────────────────────────────

"""A field-level validation error."""
type ValidationError {
  """JSON path to the invalid field."""
  field: String!
  """Human-readable description of the validation failure."""
  message: String!
  """The rejected value."""
  rejectedValue: JSON
}

"""General API error response."""
type Error {
  """HTTP status code."""
  code: Int!
  """Machine-readable error type."""
  type: String!
  """Human-readable error description."""
  message: String!
  """Field-level validation errors, if applicable."""
  validationErrors: [ValidationError!]
}

# ─── Query Root ───────────────────────────────────────────────────────────────

type Query {
  """Retrieve a document by its hash ID."""
  document(documentHash: String!, businessId: Int!): DocumentDetails

  """List documents for a business, optionally filtered by status."""
  documents(businessId: Int!, status: DocumentStatus, limit: Int, offset: Int): [Document!]!

  """Retrieve a template by its hash ID."""
  template(templateHash: String!, businessId: Int!): TemplateDetails

  """List all templates for a business."""
  templates(businessId: Int!): [Template!]!

  """Retrieve the audit trail for a document."""
  auditTrail(documentHash: String!, businessId: Int!): AuditTrail

  """Retrieve business details."""
  business(businessId: Int!): BusinessDetails

  """List team members for a business."""
  teamMembers(businessId: Int!): [TeamMember!]!

  """List API keys for a business."""
  apiKeys(businessId: Int!): [APIKey!]!

  """List registered webhooks for a business."""
  webhooks(businessId: Int!): [Webhook!]!
}

# ─── Mutation Root ────────────────────────────────────────────────────────────

"""Input for creating or sending a document."""
input DocumentInput {
  """Document title."""
  title: String!
  """Business ID."""
  businessId: Int!
  """Whether to save as draft."""
  isDraft: Boolean
  """Whether signing must proceed in order."""
  inOrder: Boolean
  """Sandbox mode (documents not legally binding)."""
  sandbox: Boolean
  """Custom email message."""
  message: String
  """Custom email subject."""
  subject: String
  """Reminder settings."""
  reminderDays: Int
  """Number of days until expiry."""
  expiryDays: Int
}

"""Input for creating a signer."""
input SignerInput {
  """Signer's full name."""
  name: String!
  """Signer's email address."""
  email: String!
  """Signing order position."""
  order: Int
  """Whether embedded signing is required."""
  embedded: Boolean
  """Custom message for this signer."""
  message: String
}

type Mutation {
  """Create a new document (draft or send immediately)."""
  createDocument(input: DocumentInput!, signers: [SignerInput!]!, fileIds: [String!]!): Document

  """Send a previously drafted document."""
  sendDocument(documentHash: String!, businessId: Int!): Document

  """Cancel a sent document."""
  cancelDocument(documentHash: String!, businessId: Int!): Document

  """Delete a draft document."""
  deleteDocument(documentHash: String!, businessId: Int!): Boolean

  """Send a reminder to pending signers."""
  sendReminder(documentHash: String!, businessId: Int!): Boolean

  """Download the final signed document PDF."""
  downloadDocument(documentHash: String!, businessId: Int!): FileBase64

  """Register a new webhook endpoint."""
  createWebhook(url: String!, businessId: Int!, events: [String!]!): Webhook

  """Delete a registered webhook."""
  deleteWebhook(webhookId: String!, businessId: Int!): Boolean
}
